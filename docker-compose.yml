version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: finrag_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: financial_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finrag_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/financial_rag
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      DEBUG: ${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  streamlit:
    build:
      context: ./frontend-streamlit
      dockerfile: Dockerfile
    container_name: finrag_streamlit
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  react:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: finrag_react
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
